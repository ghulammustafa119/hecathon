
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="resume-div">
        <header>
            <div>
                <h1 class="white"><span id="resName" class="editable"></span></h1>
                <p class="white"><span id="resDesig" class="editable"></span></p>
            </div>
            <img id="resImg" src="/mile-stone-1/gmb.jpg" alt="Profile Picture">
        </header>
        <div class="content">
            <aside>
                <section class="contact">
                    <h2>Contact</h2>
                    <p><strong>F/Name:</strong> <span id="resFname" class="editable"></span></p>
                    <p><strong>Date of Birth:</strong> <span id="resDb" class="editable"></span></p>
                    <p><strong>Gender:</strong> <span id="resGender" class="editable"></span></p>
                    <p><strong>Domicile:</strong> <span id="resDomicyle" class="editable"></span></p>
                    <p><strong>Phone:</strong> <span id="resPhone" class="editable"></span></p>
                    <p><strong>E-mail:</strong> <span id="resEmail" class="editable"></span></p>
                    <p><strong>Address:</strong> <span id="resAddress" class="editable"></span></p>
                </section>
                <section class="skill">
                    <h2 id="skillH2">Skills</h2>
                    <ul>
                        <li><span id="resSkill1" class="editable"></span></li>
                        <li><span id="resSkill2" class="editable"></span></li>
                        <li><span id="resSkill3" class="editable"></span></li>
                        <li><span id="resSkill4" class="editable"></span></li>
                        <li><span id="resSkill5" class="editable"></span></li>
                    </ul>
                </section>
            </aside>
            <main class="main-content">
                <section class="education">
                    <h2>Education</h2>
                    <p><span id="resPass" class="editable"></span></p>
                    <p><strong><span id="resDeg" class="editable"></span></strong></p>
                    <p><span id="resInst" class="editable"></span></p>
                    <p><span id="resPass2" class="editable"></span></p>
                    <p><strong><span id="resDeg2" class="editable"></span></strong></p>
                    <p><span id="resInst2" class="editable"></span></p>
                </section>
                <section class="experience">
                    <h2>Experience</h2>
                    <p><span id="resStartYear" class="editable"></span> - <span id="resEndYear" class="editable"></span></p>
                    <p><strong><span id="resCompany" class="editable"></span>, <span id="resCompanyLocation" class="editable"></span></strong></p>
                    <p><span id="resJobTitle" class="editable"></span></p>
                    <ul>
                        <li><span id="resAchv1" class="editable"></span></li>
                        <li><span id="resAchv2" class="editable"></span></li>
                        <li><span id="resAchv3" class="editable"></span></li>
                    </ul>
                </section>
                <section class="language">
                    <h2>Languages</h2>
                    <p><span id="resLang1" class="editable"></span></p>
                    <p><span id="resLang2" class="editable"></span></p>
                </section>
            </main>
        </div>
    </div>
    <div>
        <!-- edit Button -->
        <button id="editBtn"><b>editBtn</b></button>
        <!-- download as pdf Button -->
        <button id="downloadBtn"><b>Download as PDF</b></button>
        <!-- shareable link -->
        <button id="shareLink"><b>shareAbleLink</b></button>
    </div>
    <script src="index.js"></script>
</body>
</html>
